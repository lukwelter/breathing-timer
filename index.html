<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathing Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="circle-wrapper">
      <svg class="ring" viewBox="0 0 320 320" aria-hidden="true">
        <circle class="ring-circle" cx="160" cy="160" r="130"></circle>
        <circle class="progress-circle" id="progressCircle" cx="160" cy="160" r="130"></circle>
      </svg>

      <div class="dot" id="dot"></div>
      <div class="center-label" id="phaseLabel"></div>
    </div>

    <button id="mainBtn">Start</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
