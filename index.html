<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breath Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="breathing-circle" id="breathingCircle">
      <div class="half left">
        <div class="half-fill left-fill" id="leftFill"></div>
      </div>

      <div class="half right">
        <div class="half-fill right-fill" id="rightFill"></div>
      </div>

      <div class="center-label" id="phaseLabel"></div>
    </div>

    <button id="mainBtn">Start</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
